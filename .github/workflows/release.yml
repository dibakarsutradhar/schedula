name: Build & Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v2.1.0)'
        required: true

env:
  R2_BUCKET: schedula-downloads
  R2_PUBLIC_URL: https://downloads-schedula.dibakar.me

# ──────────────────────────────────────────────────────────────────────────────
# macOS — Apple Silicon (aarch64)
# Hub sidecar is built first and bundled into the Tauri app.
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  build-macos-arm:
    name: macOS Apple Silicon (arm64)
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Build hub sidecar — arm64
        run: |
          cargo build --release \
            --manifest-path hub-server/Cargo.toml \
            --target aarch64-apple-darwin
          mkdir -p src-tauri/binaries
          cp hub-server/target/aarch64-apple-darwin/release/schedula-hub \
             src-tauri/binaries/schedula-hub-aarch64-apple-darwin

      - name: Build Tauri — arm64
        env:
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY:     ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID:                   ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD:             ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:              ${{ secrets.APPLE_TEAM_ID }}
        run: npm run tauri build -- --target aarch64-apple-darwin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 1

# ──────────────────────────────────────────────────────────────────────────────
# macOS — Intel (x86_64)
# ──────────────────────────────────────────────────────────────────────────────
  build-macos-intel:
    name: macOS Intel (x86_64)
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Build hub sidecar — x86_64
        run: |
          cargo build --release \
            --manifest-path hub-server/Cargo.toml \
            --target x86_64-apple-darwin
          mkdir -p src-tauri/binaries
          cp hub-server/target/x86_64-apple-darwin/release/schedula-hub \
             src-tauri/binaries/schedula-hub-x86_64-apple-darwin

      - name: Build Tauri — x86_64
        env:
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY:     ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID:                   ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD:             ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:              ${{ secrets.APPLE_TEAM_ID }}
        run: npm run tauri build -- --target x86_64-apple-darwin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel
          path: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 1

# ──────────────────────────────────────────────────────────────────────────────
# Windows — x64
# ──────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows x64
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Build hub sidecar — Windows x64
        shell: bash
        run: |
          cargo build --release --manifest-path hub-server/Cargo.toml
          mkdir -p src-tauri/binaries
          cp hub-server/target/release/schedula-hub.exe \
             src-tauri/binaries/schedula-hub-x86_64-pc-windows-msvc.exe

      - name: Build Tauri
        run: npm run tauri build

      # Prefer NSIS (.exe) over MSI — better UX for end users
      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: src-tauri/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: warn
          retention-days: 1

      - name: Upload MSI artifact (fallback)
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn
          retention-days: 1

# ──────────────────────────────────────────────────────────────────────────────
# Publish to Cloudflare R2
# ──────────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish to Cloudflare R2
    needs: [build-macos-arm, build-macos-intel, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Determine version tag
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      # ── Download all build artifacts ────────────────────────────────────────
      - name: Download macOS ARM64
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64
          path: dist/macos-arm64

      - name: Download macOS Intel
        uses: actions/download-artifact@v4
        with:
          name: macos-intel
          path: dist/macos-intel

      - name: Download Windows NSIS
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: windows-nsis
          path: dist/windows

      - name: Download Windows MSI (fallback)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: windows-msi
          path: dist/windows

      # ── Rename to canonical filenames ───────────────────────────────────────
      - name: Rename artifacts
        id: art
        run: |
          VERSION="${{ steps.ver.outputs.tag }}"

          ARM_SRC=$(ls   dist/macos-arm64/*.dmg 2>/dev/null | head -1)
          INTEL_SRC=$(ls dist/macos-intel/*.dmg 2>/dev/null | head -1)
          WIN_SRC=$(ls   dist/windows/*.exe dist/windows/*.msi 2>/dev/null | head -1)

          ARM_DST="Schedula-${VERSION}-macos-arm64.dmg"
          INTEL_DST="Schedula-${VERSION}-macos-x64.dmg"
          WIN_DST="Schedula-${VERSION}-windows-x64-setup.exe"

          [ -n "$ARM_SRC"   ] && cp "$ARM_SRC"   "dist/${ARM_DST}"
          [ -n "$INTEL_SRC" ] && cp "$INTEL_SRC" "dist/${INTEL_DST}"
          [ -n "$WIN_SRC"   ] && cp "$WIN_SRC"   "dist/${WIN_DST}"

          echo "arm_file=${ARM_DST}"     >> $GITHUB_OUTPUT
          echo "intel_file=${INTEL_DST}" >> $GITHUB_OUTPUT
          echo "win_file=${WIN_DST}"     >> $GITHUB_OUTPUT

      # ── Apply CORS policy on R2 bucket ──────────────────────────────────────
      - name: Set R2 bucket CORS policy
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          cat > cors.json <<'EOF'
          {
            "CORSRules": [
              {
                "AllowedOrigins": ["*"],
                "AllowedMethods": ["GET", "HEAD"],
                "AllowedHeaders": ["*"],
                "MaxAgeSeconds": 3600
              }
            ]
          }
          EOF
          aws s3api put-bucket-cors \
            --bucket "${R2_BUCKET}" \
            --cors-configuration file://cors.json \
            --endpoint-url "$R2_ENDPOINT"

      # ── Upload versioned release to R2 ──────────────────────────────────────
      - name: Upload release files to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          VERSION="${{ steps.ver.outputs.tag }}"
          PREFIX="releases/${VERSION}"

          upload() {
            local file="dist/$1"
            local key="${PREFIX}/$1"
            if [ -f "$file" ]; then
              echo "Uploading $1 …"
              aws s3 cp "$file" "s3://${R2_BUCKET}/${key}" \
                --endpoint-url "$R2_ENDPOINT" \
                --no-progress
            else
              echo "Skipping $1 (not found)"
            fi
          }

          upload "${{ steps.art.outputs.arm_file }}"
          upload "${{ steps.art.outputs.intel_file }}"
          upload "${{ steps.art.outputs.win_file }}"

      # ── Write latest.json manifest ───────────────────────────────────────────
      - name: Write and upload latest.json
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          VERSION="${{ steps.ver.outputs.tag }}"
          DATE=$(date -u +%Y-%m-%d)
          BASE="${R2_PUBLIC_URL}/releases/${VERSION}"

          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "date": "${DATE}",
            "platforms": {
              "macos_arm": {
                "url": "${BASE}/${{ steps.art.outputs.arm_file }}",
                "filename": "${{ steps.art.outputs.arm_file }}"
              },
              "macos_intel": {
                "url": "${BASE}/${{ steps.art.outputs.intel_file }}",
                "filename": "${{ steps.art.outputs.intel_file }}"
              },
              "windows": {
                "url": "${BASE}/${{ steps.art.outputs.win_file }}",
                "filename": "${{ steps.art.outputs.win_file }}"
              }
            }
          }
          EOF

          # Root latest.json — landing page polls this
          aws s3 cp latest.json "s3://${R2_BUCKET}/latest.json" \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type "application/json" \
            --cache-control "no-cache, max-age=0"

          # Per-release copy (audit trail)
          aws s3 cp latest.json "s3://${R2_BUCKET}/releases/${VERSION}/manifest.json" \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type "application/json"

          echo "Published Schedula ${VERSION} to R2"
          echo "Manifest: ${R2_PUBLIC_URL}/latest.json"
