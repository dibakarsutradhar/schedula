name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos-arm64:
    name: Build macOS DMG (ARM64)
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app (ARM64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.TAURI_PAT }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Schedula ${{ github.ref_name }}'
          args: --target aarch64-apple-darwin

  build-macos-x86:
    name: Build macOS DMG (Intel)
    runs-on: macos-13
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app (x86_64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.TAURI_PAT }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Schedula ${{ github.ref_name }}'
          args: --target x86_64-apple-darwin

  build-windows:
    name: Build Windows MSI/NSIS
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.TAURI_PAT }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Schedula ${{ github.ref_name }}'

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-macos-arm64, build-macos-x86, build-windows]
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get release notes
        id: release_notes
        run: |
          VERSION="${{ github.ref_name }}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create release on GitHub
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Schedula ${{ github.ref_name }}'
          draft: false
          prerelease: false
          body: |
            # Schedula ${{ github.ref_name }}

            AI-Powered University Timetable Generator

            ## Download

            **macOS (Intel)**: Download `Schedula_${{ github.ref_name }}_x64.dmg` from the assets below
            **macOS (Apple Silicon)**: Download `Schedula_${{ github.ref_name }}_aarch64.dmg` from the assets below
            **Windows**: Download `Schedula_${{ github.ref_name }}_x64-setup.exe` from the assets below

            ## Installation

            ### macOS

            **Choose the correct version for your Mac:**
            - **Apple Silicon (M1/M2/M3)**: Download the `aarch64` version
            - **Intel Mac**: Download the `x64` version

            To check your architecture: Click the Apple menu → About This Mac → look for "Apple Silicon" or "Intel"

            1. **Download** the appropriate DMG file from the releases page
            2. **Mount** the DMG: `open Schedula-*.dmg`
            3. **Drag** Schedula.app to your Applications folder
            4. **Launch** from Applications or Spotlight

            ### Windows

            1. **Download** the `.exe` installer
            2. **Run** the installer and follow the setup wizard
            3. **Launch** from Start menu or desktop shortcut

            ## First Login

            Default credentials:
            - **Username**: `admin`
            - **Password**: `admin123`

            ⚠️ **Important**: Change your password immediately in Settings → My Profile

            ## Features

            ✨ Automated conflict-free schedule generation
            📅 Support for diverse class types (lectures, labs, tutorials)
            🔄 Biweekly course scheduling
            📊 Semester calendars with exam/study blocks
            🎨 Dark/Light theme with custom accent colors
            💾 JSON backup and CSV export
            🏢 Multi-organization support with role-based access
            ⚙️ Comprehensive settings and customization

            ## Documentation

            - [README](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/README.md) — Full guide and troubleshooting
            - [Usage Guide](#-usage-guide) — Step-by-step setup instructions
            - [API Reference](#-api-commands-reference) — All available commands

            ## Requirements

            - **macOS** 13.0 or later
            - **Disk space**: ~200 MB

            ## Support

            - 🐛 [Report issues](https://github.com/${{ github.repository }}/issues)
            - 💬 [Start a discussion](https://github.com/${{ github.repository }}/discussions)

            ---

            Made with ❤️ for academics worldwide
        env:
          GITHUB_TOKEN: ${{ secrets.TAURI_PAT }}
