services:
  - type: web
    name: schedula-license
    runtime: docker
    dockerfilePath: ./license-server/Dockerfile
    dockerContext: ./license-server
    plan: free          # upgrade to starter ($7/mo) to add the persistent disk below
    healthCheckPath: /health

    # ── Persistent disk (requires Starter plan or above) ──────────────────────
    # Uncomment once you upgrade — the free plan has ephemeral storage only,
    # meaning the license DB is reset on every restart/deploy.
    #
    # disk:
    #   name: license-data
    #   mountPath: /data
    #   sizeGB: 1

    # ── Override the Docker CMD to use /tmp while on free plan ─────────────────
    # /tmp persists for the lifetime of the running instance (not across restarts).
    # Switch --db-path to /data/schedula-license.db after adding the disk above.
    startCommand: >-
      ./schedula-license
      --port 8080
      --db-path /tmp/schedula-license.db
      --private-key /app/keys/private.pem
      --public-key  /app/keys/public.pem

    envVars:
      # ── Required ──────────────────────────────────────────────────────────────
      - key: SCHEDULA_ADMIN_KEY
        sync: false          # set in Render dashboard → Environment
      - key: PRIVATE_KEY_PEM
        sync: false          # paste contents of license-server/keys/private.pem
      - key: PUBLIC_KEY_PEM
        sync: false          # paste contents of license-server/keys/public.pem

      # ── Stripe ───────────────────────────────────────────────────────────────
      # How to get these values:
      #
      # 1. stripe.com → Developers → API keys
      #      STRIPE_SECRET_KEY       = "Secret key"  (sk_live_... or sk_test_...)
      #
      # 2. stripe.com → Developers → Webhooks → Add endpoint
      #      URL:    https://schedula-license.onrender.com/billing/webhook
      #      Events: customer.subscription.created
      #              customer.subscription.updated
      #              customer.subscription.deleted
      #              invoice.payment_failed
      #      STRIPE_WEBHOOK_SECRET   = "Signing secret" shown after saving
      #
      # 3. stripe.com → Product catalog → Create products
      #      Create "Schedula Pro" with Monthly + Annual prices
      #      Create "Schedula Institution" with Monthly + Annual prices
      #      STRIPE_PRICE_PRO_MONTHLY  = price_...
      #      STRIPE_PRICE_PRO_ANNUAL   = price_...
      #      STRIPE_PRICE_INST_MONTHLY = price_...
      #      STRIPE_PRICE_INST_ANNUAL  = price_...
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PRO_MONTHLY
        sync: false
      - key: STRIPE_PRICE_PRO_ANNUAL
        sync: false
      - key: STRIPE_PRICE_INST_MONTHLY
        sync: false
      - key: STRIPE_PRICE_INST_ANNUAL
        sync: false

      # ── App URL ───────────────────────────────────────────────────────────────
      # Used for Stripe success/cancel redirect URLs. Update when you own the domain.
      - key: APP_URL
        value: https://schedula-license.onrender.com
